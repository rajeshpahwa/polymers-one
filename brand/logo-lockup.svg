<svg xmlns="http://www.w3.org/2000/svg" width="1880" height="420" viewBox="0 0 1880 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16456f"/>
      <stop offset="1" stop-color="#081c33"/>
    </linearGradient>
    <linearGradient id="chain" gradientUnits="userSpaceOnUse" x1="295" y1="262" x2="729" y2="762">
      <stop offset="0" stop-color="#3fd08f"/>
      <stop offset="1" stop-color="#149a5e"/>
    </linearGradient>
  </defs>

  <!-- mark -->
  <g transform="translate(40,50) scale(0.3125)">
    <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
    <g stroke="url(#chain)" stroke-width="40" stroke-linecap="round">
      <line x1="512" y1="262" x2="728.5" y2="387"/>
      <line x1="728.5" y1="387" x2="728.5" y2="637"/>
      <line x1="728.5" y1="637" x2="512" y2="762"/>
      <line x1="512" y1="762" x2="295.5" y2="637"/>
      <line x1="295.5" y1="637" x2="295.5" y2="387"/>
      <line x1="295.5" y1="387" x2="512" y2="262"/>
    </g>
    <circle cx="512" cy="262" r="66" fill="#ffffff"/>
    <circle cx="295.5" cy="387" r="66" fill="#ffffff"/>
    <circle cx="295.5" cy="637" r="66" fill="#ffffff"/>
    <circle cx="512" cy="762" r="66" fill="#ffffff"/>
    <circle cx="728.5" cy="637" r="66" fill="#ffffff"/>
    <circle cx="728.5" cy="387" r="76" fill="#f5a623"/>
    <circle cx="728.5" cy="387" r="30" fill="#081c33" opacity="0.25"/>
    <circle cx="512" cy="512" r="52" fill="url(#chain)"/>
  </g>

  <!-- wordmark -->
  <text x="430" y="245" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="800" font-size="160" letter-spacing="-4">
    <tspan fill="#0e2a47">P</tspan><tspan fill="#f5a623">O</tspan><tspan fill="#0e2a47">LYMERS</tspan><tspan fill="#149a5e">.ONE</tspan>
  </text>
  <text x="436" y="330" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="600" font-size="42" letter-spacing="7" fill="#5b6472">BY 21 CENTURY POLYMERS · 36 YEARS IN RECYCLING</text>
</svg>
