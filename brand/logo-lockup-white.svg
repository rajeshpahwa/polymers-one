  <text x="436" y="330" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="600" font-size="42" letter-spacing="7" fill="#b9c6d6">BY 21 CENTURY POLYMERS · 36 YEARS IN RECYCLING</text>
